<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Alta de Vehículo - App del Taller</title>
</head>

<body>
    <header>
        <h1>Alta de Vehículo</h1>
    </header>
    <div class="layout">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="vehiculos.html">Vehículos</a></li>
                <li><a href="#">Clientes</a></li>
                <li><a href="#">Ordenes</a></li>
                <li><a href="#">Reportes</a></li>
            </ul>
        </nav>
        <main>
            <h2>Nuevo Vehículo</h2>

            <form id="form-alta" class="formulario">
                <div class=" campo">
                    <label for="patente">Patente</label>
                    <input type="text" id="patente" name="patente" placeholder="AB123CD" required>
                </div>
                <div class="campo">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" name="marca" placeholder="VolksWagen" required>
                </div>
                <div class="campo">
                    <label for="modelo">Modelo</label>
                    <input type="text" id="modelo" name="modelo" placeholder="Golf" required>
                </div>
                <div class="campo">
                    <label for="anio">Año</label>
                    <input type="number" id="anio" name="anio" min="1950" max="2030" required>
                </div>
                <div class="campo">
                    <label for="cliente">Cliente</label>
                    <input type="text" id="cliente" name="cliente" placeholder="Juan Pérez" required>
                </div>
                <div class="acciones">
                    <a href="vehiculos.html" class="btn btn-secundario">Cancelar</a>
                    <button type="submit" class="btn btn-primario">Guardar</button>
                </div>

            </form>
        </main>
    </div>

    <script src="js/alta-vehiculo.js"></script>
</body>

</html>
