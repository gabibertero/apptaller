<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Editar Veh&iacute;culo - App del Taller</title>
</head>
<body>
    <header>
        <h1>Editar Veh&iacute;culo</h1>
    </header>
    <div class="layout">
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="vehiculos.html" class="active">Veh&iacute;culos</a></li>
                <li><a href="#">Clientes</a></li>
                <li><a href="#">Ordenes</a></li>
                <li><a href="#">Reportes</a></li>
            </ul>
        </nav>
        <main>
            <h2>Editar Veh&iacute;culo</h2>
            <div id="mensaje-edicion" class="estado-pagina" hidden></div>
            <form id="form-editar" class="formulario" novalidate>
                <div class="campo">
                    <label for="patente">Patente</label>
                    <input type="text" id="patente" name="patente" placeholder="AB123CD" maxlength="7" required>
                    <p class="campo-error" id="error-patente" aria-live="polite"></p>
                </div>
                <div class="campo">
                    <label for="marca">Marca</label>
                    <input type="text" id="marca" name="marca" placeholder="Volkswagen" required>
                    <p class="campo-error" id="error-marca" aria-live="polite"></p>
                </div>
                <div class="campo">
                    <label for="modelo">Modelo</label>
                    <input type="text" id="modelo" name="modelo" placeholder="Golf" required>
                    <p class="campo-error" id="error-modelo" aria-live="polite"></p>
                </div>
                <div class="campo">
                    <label for="anio">A&ntilde;o</label>
                    <input type="number" id="anio" name="anio" min="1950" max="2030" required>
                    <p class="campo-error" id="error-anio" aria-live="polite"></p>
                </div>
                <div class="campo">
                    <label for="cliente">Cliente</label>
                    <input type="text" id="cliente" name="cliente" placeholder="Juan P&eacute;rez" required>
                    <p class="campo-error" id="error-cliente" aria-live="polite"></p>
                </div>
                <div class="campo">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado" required>
                        <option value="Recibido">Recibido</option>
                        <option value="En diagn&#243;stico">En diagn&oacute;stico</option>
                        <option value="Reparando">Reparando</option>
                        <option value="Listo para entregar">Listo para entregar</option>
                        <option value="Entregado">Entregado</option>
                    </select>
                    <p class="campo-error" id="error-estado" aria-live="polite"></p>
                </div>
                <div class="acciones">
                    <a href="vehiculos.html" class="btn btn-secundario">Cancelar</a>
                    <button type="submit" class="btn btn-primario">Guardar cambios</button>
                </div>
            </form>
        </main>
    </div>
    <script type="module" src="js/editar-vehiculo.js"></script>
</body>
</html>
